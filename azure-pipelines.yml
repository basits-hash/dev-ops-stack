trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - "*.md"
      - docs/**

pr:
  branches:
    include:
      - main
      - develop

variables:
  # Azure Container Registry
  acrName: "taskmanageracr"
  acrLoginServer: "$(acrName).azurecr.io"
  # Images
  backendImage: "$(acrLoginServer)/task-manager-backend"
  frontendImage: "$(acrLoginServer)/task-manager-frontend"
  # AKS
  aksResourceGroup: "task-manager-rg"
  aksClusterName: "task-manager-aks"
  k8sNamespace: "task-manager"
  # Build tag
  imageTag: "$(Build.BuildId)"
  pythonVersion: "3.12"

stages:
  # ─────────────────────────────────────────────
  - stage: Test
    displayName: "Test"
    jobs:
      - job: TestBackend
        displayName: "Python Backend Tests"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
            displayName: "Set up Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -r backend/requirements-dev.txt
            displayName: "Install dependencies"
            workingDirectory: $(System.DefaultWorkingDirectory)

          - script: |
              pip install flake8
              flake8 main.py --max-line-length=120 --ignore=E501,W503
            displayName: "Lint (flake8)"
            workingDirectory: $(System.DefaultWorkingDirectory)/backend

          - script: |
              pytest tests/ -v --tb=short \
                --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml
            displayName: "Run pytest"
            workingDirectory: $(System.DefaultWorkingDirectory)/backend

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "$(Build.ArtifactStagingDirectory)/test-results.xml"
              testRunTitle: "Backend Unit Tests"

      - job: TestFrontend
        displayName: "React Frontend Tests"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "18.x"
            displayName: "Set up Node.js 18"

          - script: npm ci
            displayName: "Install dependencies"
            workingDirectory: $(System.DefaultWorkingDirectory)/frontend

          - script: npm test -- --passWithNoTests --watchAll=false
            displayName: "Run Jest tests"
            workingDirectory: $(System.DefaultWorkingDirectory)/frontend

          - script: npm run build
            displayName: "Build React app"
            workingDirectory: $(System.DefaultWorkingDirectory)/frontend

  # ─────────────────────────────────────────────
  - stage: SecurityScan
    displayName: "Security Scan"
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: TrivyScan
        displayName: "Trivy Vulnerability Scan"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: |
              pip install safety
              pip install -r backend/requirements.txt
              safety check --json --output $(Build.ArtifactStagingDirectory)/safety-report.json || true
            displayName: "Python dependency audit (safety)"
            workingDirectory: $(System.DefaultWorkingDirectory)/backend

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy fs . --format sarif --output $(Build.ArtifactStagingDirectory)/trivy-fs.sarif || true
            displayName: "Trivy filesystem scan"
            workingDirectory: $(System.DefaultWorkingDirectory)

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)"
              artifactName: "security-reports"
            condition: always()

  # ─────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push Docker Images"
    dependsOn: SecurityScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildPush
        displayName: "Build and push to ACR"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: "AzureContainerRegistry"

          - task: Docker@2
            displayName: "Build & push backend image"
            inputs:
              command: buildAndPush
              repository: task-manager-backend
              dockerfile: backend/Dockerfile
              containerRegistry: "AzureContainerRegistry"
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: "Build & push frontend image"
            inputs:
              command: buildAndPush
              repository: task-manager-frontend
              dockerfile: frontend/Dockerfile
              containerRegistry: "AzureContainerRegistry"
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: "Logout from ACR"
            inputs:
              command: logout
              containerRegistry: "AzureContainerRegistry"

  # ─────────────────────────────────────────────
  - stage: DeployDev
    displayName: "Deploy to Dev (AKS)"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployAKS
        displayName: "Deploy to AKS dev namespace"
        pool:
          vmImage: ubuntu-latest
        environment: "dev"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: KubernetesManifest@1
                  displayName: "Create namespace"
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: "AzureServiceConnection"
                    azureResourceGroup: "$(aksResourceGroup)"
                    kubernetesCluster: "$(aksClusterName)"
                    namespace: "$(k8sNamespace)"
                    manifests: k8s/namespace.yaml

                - task: KubernetesManifest@1
                  displayName: "Deploy to AKS"
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: "AzureServiceConnection"
                    azureResourceGroup: "$(aksResourceGroup)"
                    kubernetesCluster: "$(aksClusterName)"
                    namespace: "$(k8sNamespace)"
                    manifests: |
                      k8s/mongodb-deployment.yaml
                      k8s/backend-deployment.yaml
                      k8s/frontend-deployment.yaml
                      k8s/ingress.yaml
                    containers: |
                      $(backendImage):$(imageTag)
                      $(frontendImage):$(imageTag)

                - task: Kubernetes@1
                  displayName: "Verify rollout"
                  inputs:
                    connectionType: azureResourceManager
                    azureSubscriptionEndpoint: "AzureServiceConnection"
                    azureResourceGroup: "$(aksResourceGroup)"
                    kubernetesCluster: "$(aksClusterName)"
                    namespace: "$(k8sNamespace)"
                    command: rollout
                    arguments: "status deployment/backend-deployment --timeout=120s"

  # ─────────────────────────────────────────────
  - stage: DeployProd
    displayName: "Deploy to Production (AKS)"
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        displayName: "Deploy to AKS production namespace"
        pool:
          vmImage: ubuntu-latest
        environment: "production"  # requires manual approval gate in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: KubernetesManifest@1
                  displayName: "Deploy to production"
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: "AzureServiceConnection"
                    azureResourceGroup: "$(aksResourceGroup)"
                    kubernetesCluster: "$(aksClusterName)"
                    namespace: "$(k8sNamespace)-prod"
                    manifests: |
                      k8s/mongodb-deployment.yaml
                      k8s/backend-deployment.yaml
                      k8s/frontend-deployment.yaml
                      k8s/ingress.yaml
                    containers: |
                      $(backendImage):$(imageTag)
                      $(frontendImage):$(imageTag)
