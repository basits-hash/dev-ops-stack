server {
    # The nginx-unprivileged base image runs as a non-root user, so we bind
    # to an unprivileged port instead of 80.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in the Server header.
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service on the compose network.
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # gzip compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers (defense-in-depth alongside the backend's own headers).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # Long-cache hashed static assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
