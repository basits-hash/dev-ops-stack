name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Backend: lint + test
  # ----------------------------------------------------------------------------
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Pytest with coverage (fail under 80%)
        working-directory: backend
        run: pytest -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=80

  # ----------------------------------------------------------------------------
  # Frontend: lint + test + build + audit
  # ----------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint src --max-warnings=0

      - name: Test
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: "true"

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: npm audit (production deps only)
        working-directory: frontend
        # Dev/build tooling (webpack-dev-server etc.) is never shipped to the
        # nginx image, so only production dependencies are gating here.
        run: npm audit --omit=dev --audit-level=high

  # ----------------------------------------------------------------------------
  # Security: SAST, dependency, secret, and Dockerfile scanning
  # ----------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Bandit (Python SAST)
        working-directory: backend
        run: bandit -r main.py config.py -ll

      - name: pip-audit (Python dependency CVEs)
        working-directory: backend
        run: pip-audit -r requirements.txt

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hadolint (backend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - name: Hadolint (frontend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ----------------------------------------------------------------------------
  # Build images + Trivy image scan
  # ----------------------------------------------------------------------------
  build:
    name: Build + Image Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: task-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: task-manager-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: task-manager-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: task-manager-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload backend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
